<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚛️ Bài Viết Nguyên Tử v5 — Lê Hữu Tuyến</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

// ═══════════════════════════════════════════════════════════════
//  SYSTEM PROMPT — Schema v3: ten_the + cau_cot_loi + noi_dung
// ═══════════════════════════════════════════════════════════════
const SYSTEM_PROMPT = `Bạn là trợ lý format Bài Viết Nguyên Tử cho Lê Hữu Tuyến — Copywriter & Direct Response Marketer, 10+ năm kinh nghiệm.

=== VAI TRÒ ===
Tuyến ghi chú thô từ trải nghiệm thực tế, quan sát, đọc sách. Bạn KHÔNG sáng tác — chỉ làm sạch, cấu trúc hóa, làm sắc nét những gì Tuyến đã sống và đã nghĩ. Kho tri thức phải mang dấu vân tay thực tế của Tuyến.

=== QUY TẮC TÁCH THẺ ===
Atomic Content = mẩu nội dung nhỏ nhất, chỉ giải quyết DUY NHẤT 1 ý tưởng.
- 1 ghi chú, 1 ý → trả về 1 thẻ
- 1 ghi chú, nhiều ý RÕ RÀNG KHÁC NHAU → tách thành nhiều thẻ, mỗi thẻ = 1 ý độc lập
- Tối đa 3 thẻ mỗi lần
- Nếu ghi chú quá lộn xộn (hơn 3 ý) → chọn 3 ý rõ nhất, bỏ phần còn lại
- Mỗi thẻ phải độc lập hoàn toàn — đọc thẻ này không cần biết thẻ kia

Tách khi ghi chú có:
• Nhiều khoảnh khắc / ví dụ khác nhau
• So sánh 2 cách làm / 2 góc nhìn đối lập
• Kết luận + lý do có thể tách thành 2 góc nhìn riêng

=== 3 FIELDS BẮT BUỘC ===

1. ten_the
3–7 từ. Đặt như tên một "vũ khí" — đọc tên là biết dùng để làm gì.
Dùng "–" nếu cần: "Neo Giá – Số Đầu Tiên", "Câu Hỏi Sau Chốt Đơn"
KHÔNG đặt tên mơ hồ như "Kỹ Thuật Hay" hay "Insight Thú Vị".

2. cau_cot_loi
Đúng 1 câu, tối đa 20 từ.
Tiêu chí vàng: nếu cắt hết mọi thứ, chỉ còn câu này — người đọc vẫn hiểu ý và tại sao quan trọng.
Câu này phải đứng được một mình như quote trên mạng xã hội.

3. noi_dung
Bài viết nguyên tử đầy đủ. Logic Hook → Idea → Insight — không phải form cứng, là cách tư duy.

  HOOK (ĐỀ):
  Câu mở phải tạo được 1 trong 3 cảm giác:
  (a) Nghịch lý — điều nghe có vẻ sai nhưng lại đúng. Ví dụ: "Tôi đóng cửa 1 năm và đó là quyết định kinh doanh tốt nhất."
  (b) Sốc nhận thức — lật ngược cách nghĩ quen thuộc. Ví dụ: "Vấn đề bán hàng của bạn không nằm ở phòng bán hàng."
  (c) Nhận ra bản thân — người đọc thấy đây là chuyện của mình. Ví dụ: "Bạn đã từng làm nhiều thứ cùng lúc mà không ra kết quả?"
  Cấu trúc hook hiệu quả: câu ngắn + ngắt dòng + câu tiếp gây tension.
  TUYỆT ĐỐI KHÔNG mở bằng: "Hôm nay tôi muốn chia sẻ", "Theo nghiên cứu", hay bất kỳ câu sáo rỗng nào.

  IDEA (THỰC + LUẬN):
  Triển khai duy nhất 1 ý trung tâm. Mỗi đoạn chỉ serve ý trung tâm đó — không được introduce ý phụ mới.
  Ví dụ PHẢI cụ thể đến mức đặt tên người/địa điểm được. Không phải "một khách hàng" — phải là "chị Hoa bán mỹ phẩm ở Vũng Tàu".
  Nếu ghi chú có bối cảnh thực tế → giữ nguyên, làm sắc nét hơn. KHÔNG tự bịa bối cảnh.
  2–3 đoạn. Mỗi đoạn: luận điểm → lý do → dẫn chứng cụ thể.

  INSIGHT (KẾT):
  1–2 câu. Đây là Principle — nguyên tắc rút ra từ toàn bài.
  Phải đứng được một mình như quote. Phải là câu đóng lại ý trung tâm.
  KHÔNG tóm tắt lại bài. KHÔNG introduce ý mới ở đây.
  Nếu có ý mới muốn thêm vào đoạn kết → đó là thẻ khác, không phải thẻ này.

Độ dài: 150–400 từ. Câu ngắn. Đoạn ngắn (2–4 câu/đoạn). Không dùng bullet point trong noi_dung.
Giọng: direct, thực chiến, không hoa mỹ — như Tuyến đang kể chuyện cho người bạn làm kinh doanh nghe.

=== KIỂM TRA BẮT BUỘC TRƯỚC KHI OUTPUT ===
□ Hook có tạo được nghịch lý / sốc nhận thức / nhận ra bản thân không?
□ Mỗi thẻ chỉ có đúng 1 ý tưởng trung tâm?
□ Mỗi đoạn trong bài có đang serve ý trung tâm đó không? (nếu bỏ 1 đoạn mà ý trung tâm không đổi → đoạn đó thừa, xóa đi)
□ Đoạn kết có phải Insight/Principle không? (không phải tóm tắt, không phải ý mới)
□ cau_cot_loi đứng được một mình như quote?
□ Ví dụ trong noi_dung có tên người/địa điểm cụ thể?
□ Giọng văn có phải của Tuyến không (direct, không hoa mỹ)?

=== FORMAT OUTPUT ===
Chỉ trả về JSON array thuần. Không markdown, không giải thích, không text nào ngoài JSON.
Bắt đầu bằng [ và kết thúc bằng ].`;

// ── CONFIG ──────────────────────────────────────────────────────
const NGUON_OPTIONS = [
  { value: 'Chuyên Môn', collection: 'kien-thuc-chuyen-mon', color: 'bg-blue-100 text-blue-700 border-blue-200' },
  { value: 'Sách',       collection: 'sach-hoc-tap',         color: 'bg-purple-100 text-purple-700 border-purple-200' },
  { value: 'Quan Sát',  collection: 'quan-sat-thuc-te',     color: 'bg-green-100 text-green-700 border-green-200' },
];
const CHUDE_OPTIONS = [
  { value: 'C1-Copywriting & Direct Response', short: 'C1 · Copywriting' },
  { value: 'C2-Tâm Lý Thuyết Phục',           short: 'C2 · Tâm Lý' },
  { value: 'C3-Hệ Thống Kinh Doanh Solo',      short: 'C3 · Hệ Thống' },
];

// ── APP ─────────────────────────────────────────────────────────
function App() {
  const [apiKey,   setApiKey]   = useState(localStorage.getItem('ant_key') || '');
  const [keySaved, setKeySaved] = useState(!!localStorage.getItem('ant_key'));
  const [nguon,    setNguon]    = useState(localStorage.getItem('sel_nguon') || 'Chuyên Môn');
  const [chuDe,    setChuDe]    = useState(localStorage.getItem('sel_chude') || 'C1-Copywriting & Direct Response');
  const [input,    setInput]    = useState('');
  const [cards,    setCards]    = useState([]);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState('');
  const [copied,   setCopied]   = useState(null);
  const [expanded, setExpanded] = useState({});
  const [editing,  setEditing]  = useState(null);
  const [editData, setEditData] = useState({});
  const resultsRef = useRef(null);

  const today      = new Date().toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const charCount  = input.length;

  const saveKey = () => {
    localStorage.setItem('ant_key', apiKey);
    setKeySaved(true);
  };

  const generate = async () => {
    if (!input.trim()) return;
    if (!apiKey) { setError('Nhập Anthropic API Key trước.'); return; }
    setLoading(true); setError(''); setCards([]); setCopied(null);

    const userMsg = `Nguồn: ${nguon}\nChủ đề: ${chuDe}\nNgày: ${today}\n\nGhi chú của tôi:\n${input.trim()}`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5',
          max_tokens: 4000,
          system: SYSTEM_PROMPT,
          messages: [{ role: 'user', content: userMsg }],
        }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      const raw    = data.content?.[0]?.text || '[]';
      const clean  = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      if (!Array.isArray(parsed) || parsed.length === 0) throw new Error('Không parse được kết quả. Thử lại.');

      setCards(parsed.map(c => ({ ...c, nguon, chu_de: chuDe })));
      setExpanded({}); setEditing(null);
      setTimeout(() => resultsRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
    } catch (e) {
      setError(e.message || 'Lỗi không xác định. Kiểm tra API Key và thử lại.');
    }
    setLoading(false);
  };

  const buildRow  = (c) => [c.ten_the, c.cau_cot_loi, c.noi_dung, c.nguon, c.chu_de, 'pending'].join('\t');
  const copyCards = (key) => {
    const list = key === 'all' ? cards : [cards[key]];
    navigator.clipboard.writeText(list.map(buildRow).join('\n'));
    setCopied(key);
    setTimeout(() => setCopied(null), 2500);
  };

  const startEdit  = (idx) => { setEditing(idx); setEditData({ ...cards[idx] }); };
  const cancelEdit = ()    => { setEditing(null); setEditData({}); };
  const saveEdit   = (idx) => {
    setCards(prev => prev.map((c, i) => i === idx ? { ...editData } : c));
    setEditing(null); setEditData({});
  };
  const delCard = (idx) => setCards(prev => prev.filter((_, i) => i !== idx));

  const selectNguon = (v) => { localStorage.setItem('sel_nguon', v); setNguon(v); };
  const selectChuDe = (v) => { localStorage.setItem('sel_chude', v); setChuDe(v); };
  const nguonInfo   = (v) => NGUON_OPTIONS.find(n => n.value === v) || NGUON_OPTIONS[0];

  return (
    <div className="min-h-screen bg-gray-50 p-4">
      <div className="max-w-2xl mx-auto">

        {/* ── Header ── */}
        <div className="mb-5">
          <div className="flex items-center gap-2">
            <h1 className="text-xl font-bold text-gray-800">⚛️ Bài Viết Nguyên Tử</h1>
            <span className="text-xs bg-indigo-100 text-indigo-600 font-semibold px-2 py-0.5 rounded-full">v5.0</span>
          </div>
          <p className="text-gray-400 text-xs mt-1">
            Lê Hữu Tuyến · Copywriting & Direct Response · Paste ghi chú thô → nhận thẻ tri thức → dán vào Sheet
          </p>
        </div>

        {/* ── API Key ── */}
        <div className="bg-white rounded-xl border border-gray-200 p-4 mb-4">
          <label className="block text-xs font-medium text-gray-600 mb-1.5">
            Anthropic API Key {keySaved && <span className="text-green-500 ml-1">✓ Đã lưu</span>}
          </label>
          <div className="flex gap-2">
            <input
              type="password"
              className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
              placeholder="sk-ant-api03-..."
              value={apiKey}
              onChange={e => { setApiKey(e.target.value); setKeySaved(false); }}
            />
            <button onClick={saveKey}
              className="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 text-sm font-medium px-4 py-2 rounded-lg transition whitespace-nowrap">
              Lưu
            </button>
          </div>
          <p className="text-xs text-gray-400 mt-1.5">
            Key lưu trên trình duyệt, chỉ gửi thẳng đến Anthropic.{' '}
            <a href="https://console.anthropic.com/settings/keys" target="_blank"
               className="text-indigo-400 hover:underline">Lấy key tại đây →</a>
          </p>
        </div>

        {/* ── Phân loại ── */}
        <div className="bg-white rounded-xl border border-gray-200 p-4 mb-4">
          <p className="text-xs font-medium text-gray-600 mb-3">
            Phân loại thẻ <span className="text-gray-400 font-normal">(chọn trước khi tạo)</span>
          </p>

          <p className="text-xs text-gray-400 mb-1.5">Nguồn</p>
          <div className="flex gap-2 flex-wrap mb-3">
            {NGUON_OPTIONS.map(n => (
              <button key={n.value} onClick={() => selectNguon(n.value)}
                className={`text-xs px-3 py-1.5 rounded-lg border font-medium transition ${
                  nguon === n.value
                    ? 'bg-indigo-600 text-white border-indigo-600'
                    : 'bg-gray-50 text-gray-600 border-gray-200 hover:border-indigo-300'
                }`}>
                {n.value}
              </button>
            ))}
          </div>

          <p className="text-xs text-gray-400 mb-1.5">Chủ đề</p>
          <div className="flex gap-2 flex-wrap">
            {CHUDE_OPTIONS.map(c => (
              <button key={c.value} onClick={() => selectChuDe(c.value)}
                className={`text-xs px-3 py-1.5 rounded-lg border font-medium transition ${
                  chuDe === c.value
                    ? 'bg-indigo-600 text-white border-indigo-600'
                    : 'bg-gray-50 text-gray-600 border-gray-200 hover:border-indigo-300'
                }`}>
                {c.short}
              </button>
            ))}
          </div>
        </div>

        {/* ── Input ── */}
        <div className="bg-white rounded-xl border border-gray-200 p-4 mb-4">
          <label className="block text-sm font-medium text-gray-700 mb-1">Ghi chú thô</label>
          <p className="text-xs text-gray-400 mb-2">
            Ghi bất cứ thứ gì — gạch đầu dòng, đoạn lộn xộn, câu chưa xong. Nhiều ý một lần → AI tự tách thành từng thẻ riêng (tối đa 3).
          </p>
          <div className="relative">
            <textarea
              className="w-full border border-gray-200 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-300 resize-y min-h-[130px]"
              rows={6}
              value={input}
              onChange={e => setInput(e.target.value)}
              placeholder="Ví dụ: Hôm nay xem video quán phở để tô 150k đầu menu, 60k ở dưới. Khách cứ gọi 60k mà không thấy đắt. Nhớ Cialdini viết về contrast principle..."
            />
            <div className={`absolute bottom-2 right-2.5 text-xs font-medium ${
              charCount > 900 ? 'text-red-500' : charCount > 700 ? 'text-amber-500' : 'text-gray-400'
            }`}>
              {charCount} / 900{charCount > 900 && <span className="ml-1 font-bold">– Rút gọn!</span>}
            </div>
          </div>

          {charCount > 900 && (
            <p className="mt-1.5 text-xs text-red-600 bg-red-50 border border-red-200 p-2 rounded-lg">
              Ghi chú quá dài → AI dễ tách sai. Chắt lọc còn 1–2 ý chính. Rác vào → rác ra.
            </p>
          )}

          <button
            onClick={generate}
            disabled={loading || !input.trim() || !apiKey}
            className={`mt-3 w-full py-2.5 rounded-lg text-white font-semibold text-sm transition ${
              loading || !input.trim() || !apiKey
                ? 'bg-gray-300 cursor-not-allowed'
                : 'bg-indigo-600 hover:bg-indigo-700'
            }`}>
            {loading ? '⏳ Claude đang format thẻ...' : '⚛️ Tạo Thẻ Tri Thức'}
          </button>

          {error && (
            <div className="mt-2 text-red-600 text-xs bg-red-50 border border-red-200 p-2.5 rounded-lg">
              ⚠️ {error}
            </div>
          )}
        </div>

        {/* ── Results ── */}
        {cards.length > 0 && (
          <div ref={resultsRef}>
            <div className="flex items-center justify-between mb-3">
              <div>
                <p className="text-sm font-semibold text-gray-700">
                  {cards.length} Thẻ Tri Thức — kiểm tra trước khi copy
                </p>
                <p className="text-xs text-gray-400 mt-0.5">Mỗi thẻ = 1 ý duy nhất độc lập</p>
              </div>
              <button onClick={() => copyCards('all')}
                className="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition whitespace-nowrap">
                {copied === 'all' ? '✅ Đã copy!' : '📋 Copy tất cả'}
              </button>
            </div>

            {cards.map((card, idx) => {
              const ni     = nguonInfo(card.nguon);
              const isEdit = editing === idx;
              const isExp  = expanded[idx];
              const long   = card.noi_dung?.length > 350;
              const chuDeShort = CHUDE_OPTIONS.find(c => c.value === card.chu_de)?.short || card.chu_de;

              if (isEdit) return (
                <div key={idx} className="bg-white rounded-xl border border-indigo-300 p-4 mb-4">
                  <div className="flex items-center gap-2 mb-4">
                    <span className="text-xs bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full font-medium">
                      #{idx+1} Đang chỉnh sửa
                    </span>
                  </div>

                  {[
                    { key: 'ten_the',     label: 'ten_the',     hint: '3–7 từ, tên vũ khí',           rows: 1 },
                    { key: 'cau_cot_loi', label: 'cau_cot_loi', hint: '1 câu, tối đa 20 từ',          rows: 2 },
                    { key: 'noi_dung',    label: 'noi_dung',    hint: '200–500 từ, Đề–Thực–Luận–Kết', rows: 8 },
                  ].map(({ key, label, hint, rows }) => (
                    <div key={key} className="mb-3">
                      <label className="text-xs font-medium text-gray-600 flex justify-between mb-1">
                        <span>{label}</span>
                        <span className="text-gray-400 font-normal italic">{hint}</span>
                      </label>
                      {rows === 1
                        ? <input
                            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-300"
                            value={editData[key] || ''}
                            onChange={e => setEditData(p => ({ ...p, [key]: e.target.value }))} />
                        : <textarea
                            className="w-full border border-gray-200 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-300 resize-y"
                            rows={rows}
                            value={editData[key] || ''}
                            onChange={e => setEditData(p => ({ ...p, [key]: e.target.value }))} />
                      }
                    </div>
                  ))}

                  <div className="mb-3">
                    <label className="text-xs font-medium text-gray-600 mb-1 block">nguon</label>
                    <select className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-300"
                      value={editData.nguon || 'Chuyên Môn'}
                      onChange={e => setEditData(p => ({ ...p, nguon: e.target.value }))}>
                      {NGUON_OPTIONS.map(n => (
                        <option key={n.value} value={n.value}>{n.value} → {n.collection}</option>
                      ))}
                    </select>
                  </div>
                  <div className="mb-4">
                    <label className="text-xs font-medium text-gray-600 mb-1 block">chu_de</label>
                    <select className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-300"
                      value={editData.chu_de || chuDe}
                      onChange={e => setEditData(p => ({ ...p, chu_de: e.target.value }))}>
                      {CHUDE_OPTIONS.map(c => (
                        <option key={c.value} value={c.value}>{c.short}</option>
                      ))}
                    </select>
                  </div>

                  <div className="flex gap-2">
                    <button onClick={() => saveEdit(idx)}
                      className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2 rounded-lg transition">
                      ✓ Lưu chỉnh sửa
                    </button>
                    <button onClick={cancelEdit}
                      className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-medium py-2 rounded-lg transition">
                      Huỷ
                    </button>
                  </div>
                </div>
              );

              return (
                <div key={idx} className="bg-white rounded-xl border border-gray-200 p-4 mb-4">
                  {/* Header */}
                  <div className="flex items-start justify-between mb-3">
                    <div className="flex-1 min-w-0 mr-3">
                      <div className="flex items-center gap-2">
                        <span className="text-xs text-gray-400 font-medium">#{idx+1}</span>
                        <p className="font-semibold text-gray-800 text-sm">{card.ten_the}</p>
                      </div>
                      <div className="flex items-center gap-2 mt-1.5 flex-wrap">
                        <span className={`text-xs px-2 py-0.5 rounded-full font-medium border ${ni.color}`}>
                          {card.nguon}
                        </span>
                        <span className="text-xs text-gray-400">→ {ni.collection}</span>
                        <span className="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">
                          {chuDeShort}
                        </span>
                      </div>
                    </div>
                    <div className="flex gap-1.5 flex-shrink-0">
                      <button onClick={() => startEdit(idx)}
                        className="text-xs text-indigo-500 px-2.5 py-1 rounded-lg border border-indigo-200 hover:bg-indigo-50 transition">
                        Sửa
                      </button>
                      <button onClick={() => delCard(idx)}
                        className="text-xs text-red-400 px-2.5 py-1 rounded-lg border border-red-200 hover:bg-red-50 transition">
                        Xóa
                      </button>
                    </div>
                  </div>

                  {/* cau_cot_loi */}
                  <div className="bg-indigo-50 rounded-lg p-2.5 border border-indigo-100 mb-2">
                    <p className="text-xs text-indigo-400 font-semibold mb-1">💡 Câu cốt lõi</p>
                    <p className="text-sm text-gray-800 font-medium leading-snug">{card.cau_cot_loi}</p>
                  </div>

                  {/* noi_dung */}
                  <div className="bg-gray-50 rounded-lg p-2.5 border border-gray-100">
                    <p className="text-xs text-gray-400 font-semibold mb-1.5">📝 Nội dung</p>
                    <p className={`text-xs text-gray-700 leading-relaxed whitespace-pre-wrap ${long && !isExp ? 'line-clamp-6' : ''}`}>
                      {card.noi_dung}
                    </p>
                    {long && (
                      <button
                        onClick={() => setExpanded(p => ({ ...p, [idx]: !isExp }))}
                        className="mt-1.5 text-xs text-indigo-500 hover:text-indigo-700 font-medium transition">
                        {isExp ? '▲ Thu gọn' : '▼ Đọc đầy đủ'}
                      </button>
                    )}
                  </div>

                  {/* Copy this card */}
                  <div className="flex justify-end mt-2.5">
                    <button onClick={() => copyCards(idx)}
                      className="text-xs text-gray-500 hover:text-green-600 border border-gray-200 hover:border-green-300 px-3 py-1 rounded-lg transition">
                      {copied === idx ? '✅ Đã copy thẻ này' : '📋 Copy thẻ này'}
                    </button>
                  </div>
                </div>
              );
            })}

            {/* Copy all button */}
            <button onClick={() => copyCards('all')}
              className="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition mb-4 text-sm">
              {copied === 'all' ? '✅ Đã copy! Vào Sheet paste vào ô B dòng trống.' : '📋 Copy tất cả → Paste vào Google Sheet'}
            </button>

            {/* Paste guide */}
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-6">
              <p className="text-xs font-semibold text-amber-800 mb-1.5">Cách paste vào Sheet KHO:</p>
              <p className="text-xs text-amber-700 leading-relaxed">
                1. Click ô <strong>B</strong> của dòng trống đầu tiên trong Sheet<br/>
                2. Nhấn <strong>Ctrl+V</strong> (Windows) hoặc <strong>Cmd+V</strong> (Mac)<br/>
                3. Dữ liệu tự điền vào đúng cột B→G ✅<br/>
                <span className="text-amber-500 mt-1 block">Cột H trở đi để trống — EC2 tự điền lúc 02:00 AM</span>
              </p>
            </div>
          </div>
        )}

        {/* Footer */}
        <p className="text-center text-xs text-gray-300 pb-6">
          claude-haiku-4-5 · text-embedding-3-small · Qdrant<br/>
          "Viết nhỏ mỗi ngày. Lưu đúng cấu trúc. Để AI nhân lên."
        </p>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
