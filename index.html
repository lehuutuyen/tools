<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACS Writing Assistant — Trợ Lý Viết Bài Nguyên Tử</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #121214, #0a0a0c);
            color: #e2e2e7;
            min-height: 100vh;
        }
        h1, h2, h3, .font-outfit {
            font-family: 'Outfit', sans-serif;
        }
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1.25rem;
        }
        .glass-dark {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .btn-premium {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.2s ease;
        }
        .input-glass:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIG & PROMPTS ---
        const USER_NAME = "Lê Hữu Tuyến";
        const BRAND_VOICE = `
Viết như nói, xưng bạn — tôi. Mỗi câu không quá 20 từ.
Câu ngắn, đoạn ngắn, giọng văn gần gũi.
Tính Cách: Gần Gũi — Sắc Bén — Ấm Áp.
- GẦN GŨI: Người xem cảm thấy đang được nói chuyện, không bị dạy.
- SẮC BÉN: Không một từ thừa — mỗi câu phải kiếm được vị trí của nó. 
- ẤM ÁP: Không phán xét — đứng cùng phía với người xem.
Hình mẫu: Người bạn thân thông minh chia sẻ từ tâm.
Sử dụng: Open Loop, Sleight of Mouth, Embedded Command, Pacing & Leading.
Chiến lược (Schwartz): Đánh thức ham muốn có sẵn, tập trung vào Bậc nhận thức 2-3 (Problem/Solution Aware).
`.trim();

        const SYSTEM_PROMPT = `Bạn là Trợ lý Viết Bài Nguyên Tử (Assistant Writer) cho hệ thống Atomic Content System (ACS) của ${USER_NAME}.
Nhiệm vụ của bạn: Chuyển đổi ghi chú thô thành "Thẻ Tri Thức" chuẩn schema.

=== NGUYÊN TẮC CỐT LÕI ===
1. SINGLE IDEA: Mỗi thẻ chỉ chở duy nhất MỘT ý tưởng. Nếu input có nhiều ý → Tách thành nhiều object JSON riêng biệt.
2. DUNG LƯỢNG: Tổng phần 'noi_dung' PHẢI ≤ 250 từ. Càng ngắn càng sắc bén.
3. BRAND VOICE: ${BRAND_VOICE}

=== FRAMEWORK ĐỀ–THỰC–LUẬN–KẾT ===
Mỗi thẻ tri thức (field 'noi_dung') phải tuân thủ cấu trúc:
- ĐỀ (Hook): Quan sát lạ, nghịch lý hoặc câu hỏi gây tò mò.
- THỰC (Context): Bối cảnh thực tế VN, ví dụ cụ thể đặt tên được (anh A, chị B, quán phở X...). Làm rõ vấn đề.
- LUẬN (Argument): 1 luận điểm chính + dẫn chứng thực tế + 1 phản biện hóa giải nghi ngờ.
- KẾT (Core Lesson): Một đúc rút đứng được một mình.

=== OUTPUT SCHEMA (JSON Array) ===
Trả về một JSON Array thuần túy chứa các object:
{
  "ten_the": "3-7 từ, tên vũ khí",
  "cau_cot_loi": "1 câu ≤ 20 từ, đứng được một mình",
  "noi_dung": "Toàn bộ bài viết theo framework Đề-Thực-Luận-Kết. Dưới 250 từ.",
  "nguon": "Chọn 1 trong 3: 'Chuyên Môn', 'Sách', 'Quan Sát'",
  "chu_de": "Dự đoán pillar (C1, C2, C3)"
}

Chỉ trả về JSON Array thuần. Không markdown. Không giải thích.`;

        const ANALYZE_PROMPT = `Bạn là chuyên gia chẩn đoán nội dung ACS. Kiểm tra ghi chú thô sau:
1. Có bị lẫn nhiều ý tưởng không? (Nếu có, đếm số thẻ dự kiến tách).
2. Bối cảnh thực tế có đủ "Thực" (cụ thể tên, địa điểm, sự việc) không?
3. Có tiềm năng tạo "Điều bất ngờ" đảo lộn nhận thức không?
4. Xác định bậc nhận thức của khán giả (Unaware, Problem Aware, Solution Aware...).

Trả về JSON Object: { "so_the_du_kien": number, "chat_luong": "TỐT|KHÁ|YẾU", "goi_y_bo_sung": string[], "bac_nhan_thuc": string }`;

        // --- COMPONENTS ---
        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('acs_oai_key') || '');
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [analyzing, setAnalyzing] = useState(false);
            const [analysis, setAnalysis] = useState(null);
            const [cards, setCards] = useState([]);
            const [error, setError] = useState('');
            const [copied, setCopied] = useState(null);

            const saveApiKey = (key) => {
                setApiKey(key);
                localStorage.setItem('acs_oai_key', key);
            };

            const callAI = async (prompt, content) => {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { role: "system", content: prompt },
                            { role: "user", content: content }
                        ],
                        temperature: 0.7
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data.choices[0].message.content;
            };

            const handleAnalyze = async () => {
                if (!input.trim()) return;
                setAnalyzing(true);
                setError('');
                try {
                    const res = await callAI(ANALYZE_PROMPT, input);
                    setAnalysis(JSON.parse(res.replace(/```json|```/g, "").trim()));
                } catch (e) {
                    setError('Phân tích thất bại: ' + e.message);
                }
                setAnalyzing(false);
            };

            const handleFormat = async () => {
                if (!input.trim()) return;
                setLoading(true);
                setError('');
                try {
                    const res = await callAI(SYSTEM_PROMPT, input);
                    const parsed = JSON.parse(res.replace(/```json|```/g, "").trim());
                    setCards(Array.isArray(parsed) ? parsed : [parsed]);
                } catch (e) {
                    setError('Format thất bại: ' + e.message);
                }
                setLoading(false);
            };

            const copyToClipboard = (text, id) => {
                navigator.clipboard.writeText(text);
                setCopied(id);
                setTimeout(() => setCopied(null), 2000);
            };

            const copyAll = () => {
                const allText = cards.map(c => 
                    `\t${c.ten_the}\t${c.cau_cot_loi}\t${c.noi_dung}\t${c.nguon}\t${c.chu_de}\tpending\t\t`
                ).join('\n');
                copyToClipboard(allText, 'all');
            };

            return (
                <div className="max-w-4xl mx-auto px-4 py-8">
                    {/* Header */}
                    <header className="mb-10 text-center">
                        <div className="inline-block px-4 py-1.5 glass mb-4 text-xs font-semibold tracking-widest text-indigo-400 uppercase">
                            Atomic Content System
                        </div>
                        <h1 className="text-4xl font-bold font-outfit mb-2 bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
                            Writing Assistant v4.0
                        </h1>
                        <p className="text-gray-500 text-sm">Biến ghi chú thô thành vũ khí tri thức sắc bén.</p>
                    </header>

                    {/* API Config */}
                    <div className="glass p-6 mb-8">
                        <div className="flex items-center justify-between mb-4">
                            <h2 className="text-sm font-semibold uppercase tracking-wider text-gray-400">Cấu hình API</h2>
                            <span className="text-[10px] text-gray-600">Dữ liệu lưu local tại trình duyệt</span>
                        </div>
                        <input 
                            type="password"
                            placeholder="Dán OpenAI API Key tại đây..."
                            className="w-full px-4 py-3 rounded-xl input-glass text-sm"
                            value={apiKey}
                            onChange={(e) => saveApiKey(e.target.value)}
                        />
                    </div>

                    {/* Main Input Area */}
                    <div className="glass p-8 mb-8 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-indigo-500/5 blur-[80px] rounded-full -mr-20 -mt-20"></div>
                        
                        <div className="relative z-10">
                            <label className="block text-sm font-medium mb-3 text-gray-300">Nhập ghi chú thô, trải nghiệm, hoặc ý tưởng của bạn:</label>
                            <textarea 
                                className="w-full h-48 px-4 py-4 rounded-xl input-glass resize-none text-base leading-relaxed mb-6"
                                placeholder="..."
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                            ></textarea>

                            <div className="flex flex-col sm:flex-row gap-4">
                                <button 
                                    onClick={handleAnalyze}
                                    disabled={analyzing || !input}
                                    className="flex-1 px-6 py-3.5 glass hover:bg-white/5 transition font-semibold rounded-xl text-sm flex items-center justify-center gap-2"
                                >
                                    {analyzing ? (
                                        <><span className="w-4 h-4 border-2 border-indigo-400/30 border-t-indigo-400 rounded-full animate-spin"></span> Đang chẩn báo...</>
                                    ) : (
                                        <>🔍 Chẩn báo (Analyze)</>
                                    )}
                                </button>
                                <button 
                                    onClick={handleFormat}
                                    disabled={loading || !input || !apiKey}
                                    className="flex-[1.5] px-6 py-3.5 btn-premium text-white font-semibold rounded-xl text-sm flex items-center justify-center gap-2"
                                >
                                    {loading ? (
                                        <><span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> Đang đúc kết...</>
                                    ) : (
                                        <>✨ Sắc nét hóa (Format)</>
                                    )}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Analysis Results */}
                    {analysis && (
                        <div className="glass p-6 mb-8 border-l-4 border-l-indigo-500 bg-indigo-500/5 animate-in slide-in-from-top duration-300">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="font-outfit font-semibold text-lg flex items-center gap-2">
                                    📊 Kết quả chẩn báo
                                    <span className={`text-[10px] px-2 py-0.5 rounded border ${
                                        analysis.chat_luong === 'TỐT' ? 'border-green-500/50 text-green-400 bg-green-500/10' : 
                                        analysis.chat_luong === 'KHÁ' ? 'border-yellow-500/50 text-yellow-400 bg-yellow-500/10' : 
                                        'border-red-500/50 text-red-400 bg-red-500/10'
                                    }`}>
                                        {analysis.chat_luong}
                                    </span>
                                </h3>
                                <div className="text-xs text-gray-500">Dự kiến tách: <strong>{analysis.so_the_du_kien} thẻ</strong></div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="bg-black/20 p-4 rounded-xl">
                                    <p className="text-[10px] uppercase tracking-wider text-gray-500 mb-2">Bậc nhận thức khán giả</p>
                                    <p className="text-sm font-medium text-indigo-300">{analysis.bac_nhan_thuc}</p>
                                </div>
                                <div className="bg-black/20 p-4 rounded-xl">
                                    <p className="text-[10px] uppercase tracking-wider text-gray-500 mb-2">Gợi ý bổ sung</p>
                                    <ul className="text-xs space-y-1.5 text-gray-400">
                                        {analysis.goi_y_bo_sung.map((item, i) => <li key={i}>• {item}</li>)}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Generated Cards */}
                    {cards.length > 0 && (
                        <div className="space-y-6">
                            <div className="flex items-center justify-between">
                                <h2 className="text-xl font-outfit font-bold">Thành phẩm ({cards.length})</h2>
                                <button 
                                    onClick={copyAll}
                                    className="px-4 py-2 bg-green-500/10 border border-green-500/30 text-green-400 text-xs font-bold rounded-lg hover:bg-green-500/20 transition"
                                >
                                    {copied === 'all' ? '✅ Đã copy cho GSheet!' : '📋 Copy tất cả (Tab format)'}
                                </button>
                            </div>
                            
                            {cards.map((card, idx) => (
                                <div key={idx} className="glass p-8 relative group">
                                    <div className="absolute top-4 right-4 flex gap-2">
                                        <button 
                                            onClick={() => copyToClipboard(card.noi_dung, idx)}
                                            className="p-2 glass hover:bg-white/10 text-gray-400 hover:text-white transition rounded-lg"
                                            title="Copy nội dung"
                                        >
                                            {copied === idx ? '✅' : '📄'}
                                        </button>
                                    </div>

                                    <div className="flex flex-wrap gap-2 mb-4">
                                        <span className="text-[10px] px-2 py-0.5 rounded-full bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 font-bold uppercase tracking-tight">#{idx + 1}</span>
                                        <span className="text-[10px] px-2 py-0.5 rounded-full bg-white/5 text-gray-400 border border-white/10 font-bold uppercase tracking-tight">{card.nguon}</span>
                                        <span className="text-[10px] px-2 py-0.5 rounded-full bg-white/5 text-gray-400 border border-white/10 font-bold uppercase tracking-tight">{card.chu_de}</span>
                                    </div>

                                    <h3 className="text-xl font-bold font-outfit mb-4 text-white group-hover:text-indigo-300 transition-colors uppercase tracking-wide">
                                        {card.ten_the}
                                    </h3>

                                    <div className="glass-dark p-5 rounded-xl border-l-2 border-indigo-500/50 mb-6 italic text-gray-300 text-sm leading-relaxed">
                                        "{card.cau_cot_loi}"
                                    </div>

                                    <div className="space-y-4">
                                        <div className="text-sm font-medium text-gray-400 uppercase tracking-[0.2em] text-[10px] mb-2 px-1">Nội dung Framework</div>
                                        <div className="text-base text-gray-300 leading-[1.8] whitespace-pre-wrap font-light">
                                            {card.noi_dung}
                                        </div>
                                    </div>
                                    
                                    <div className="mt-6 pt-6 border-t border-white/5 flex justify-between items-center">
                                        <div className="text-[10px] text-gray-600 font-mono">ID: {Math.random().toString(36).substr(2, 9).toUpperCase()}</div>
                                        <div className="text-[10px] text-gray-600">Dung lượng: {card.noi_dung.split(/\s+/).length} từ</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {error && (
                        <div className="mt-8 p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-xl text-center">
                            {error}
                        </div>
                    )}

                    {/* Footer Instructions */}
                    <footer className="mt-20 pt-8 border-t border-white/5 text-center">
                        <p className="text-[10px] text-gray-600 uppercase tracking-widest mb-4">Hướng dẫn nhanh</p>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="text-xs text-gray-500">
                                <span className="block font-bold text-indigo-400 mb-1">1. Phân tích</span>
                                Kiểm tra xem ghi chú có đủ "Thực" để AI đúc kết không.
                            </div>
                            <div className="text-xs text-gray-500">
                                <span className="block font-bold text-indigo-400 mb-1">2. Format</span>
                                Đưa về cấu trúc Đề-Thực-Luận-Kết & Brand Voice.
                            </div>
                            <div className="text-xs text-gray-500">
                                <span className="block font-bold text-indigo-400 mb-1">3. Xuất kho</span>
                                Copy tất cả và dán vào Sheet KHO (Cột B-G).
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
