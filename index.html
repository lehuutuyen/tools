<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>ACS Writing Assistant v4.1 — Trợ Lý Tri Thức</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-bg: #fdfcf8;
            --paper-border: #e8e6df;
            --accent-blue: #2563eb;
            --accent-amber: #b45309;
        }
        body {
            font-family: 'Spline Sans', sans-serif;
            background-color: #f5f4ef;
            color: #1a1a1c;
            -webkit-font-smoothing: antialiased;
        }
        .paper {
            background-color: var(--paper-bg);
            border: 1px solid var(--paper-border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border-radius: 8px;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        .btn-primary {
            background-color: #1a1a1c;
            color: white;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #333;
            transform: translateY(-1px);
        }
        .input-classic {
            background: white;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            transition: border-color 0.2s;
        }
        .input-classic:focus {
            border-color: var(--accent-blue);
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .tab-active {
            border-bottom: 2px solid #1a1a1c;
            color: #1a1a1c;
            font-weight: 600;
        }
        @media (max-width: 640px) {
            .mobile-p { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- BỘ CÀI ĐẶT ---
        const USER_NAME = "Lê Hữu Tuyến";
        const BRAND_VOICE = `
Viết như nói, xưng bạn — tôi. Mỗi câu không quá 20 từ.
Tính Cách: Gần Gũi — Sắc Bén — Ấm Áp.
Hình mẫu: Người bạn thân thông minh kể bí mật cà phê.
Sử dụng: Open Loop, Sleight of Mouth, Embedded Command, Pacing & Leading.
Chiến lược: Đánh thức ham muốn có sẵn.
`.trim();

        const SYSTEM_PROMPT = `Bạn là Trợ lý Viết Bài Nguyên Tử v4.1 cho ${USER_NAME}.
Nhiệm vụ: Chuyển ghi chú thành Thẻ Tri Thức chuẩn schema.

=== NGUYÊN TẮC ===
1. SINGLE IDEA: Mỗi thẻ 1 ý tưởng. Tách đúng số lượng thẻ người dùng yêu cầu.
2. DUNG LƯỢNG: noi_dung PHẢI ≤ 250 từ. Sắc bén, không từ thừa.
3. BRAND VOICE: ${BRAND_VOICE}

=== CẤU TRÚC ĐỀ–THỰC–LUẬN–KẾT ===
- ĐỀ (Hook): Nghịch lý, câu hỏi gây tò mò.
- THỰC (Context): Bối cảnh thực tế VN, cụ thể tên/việc.
- LUẬN (Argument): 1 luận điểm chính + 1 phản biện hóa giải.
- KẾT (Conclusion): Đúc kết đứng được một mình.

=== OUTPUT SCHEMA (JSON Array) ===
[
  {
    "ten_the": "tên vũ khí 3-7 từ",
    "cau_cot_loi": "1 câu ≤ 20 từ",
    "noi_dung": "Toàn bộ bài viết ≤ 250 từ",
    "nguon": "Chọn 1: 'Chuyên Môn'|'Sách'|'Quan Sát'",
    "chu_de": "Chọn 1: 'C1-Copywriting & Direct Response'|'C2-Tâm Lý Thuyết Phục'|'C3-Hệ Thống Kinh Doanh Solo'",
    "atomic_score": 1-10,
    "ly_do_score": "ngắn gọn vì sao"
  }
]
Luôn trả về JSON Array thuần.`;

        const ANALYZE_PROMPT = `Chẩn đoán ghi chú ACS:
1. Có bị lẫn nhiều ý không? Số thẻ dự kiến?
2. Bối cảnh thực tế (Thực) có cụ thể không?
3. Bậc nhận thức khán giả?

Trả về JSON: { "so_the_du_kien": number, "chat_luong": "TỐT|KHÁ|YẾU", "goi_y": string[], "bac_nhan_thuc": string }`;

        function App() {
            const [tab, setTab] = useState('raw'); // 'raw' hoặc 'guided'
            const [apiKey, setApiKey] = useState(localStorage.getItem('acs_v4_key') || '');
            const [rawInput, setRawInput] = useState('');
            const [guided, setGuided] = useState({ hook: '', context: '', argument: '', conclusion: '' });
            const [analyzing, setAnalyzing] = useState(false);
            const [formatting, setFormatting] = useState(false);
            const [analysis, setAnalysis] = useState(null);
            const [cards, setCards] = useState([]);
            const [error, setError] = useState('');
            const [copied, setCopied] = useState(false);

            const saveKey = (val) => { setApiKey(val); localStorage.setItem('acs_v4_key', val); };

            const callAI = async (p, c) => {
                const res = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({ model: "gpt-4o-mini", messages: [{role:"system", content:p}, {role:"user", content:c}], temperature: 0.6 })
                });
                const d = await res.json();
                if (d.error) throw new Error(d.error.message);
                return d.choices[0].message.content;
            };

            const handleAnalyze = async () => {
                setAnalyzing(true); setAnalysis(null); setError('');
                try {
                    const text = tab === 'raw' ? rawInput : Object.values(guided).join('\n');
                    const res = await callAI(ANALYZE_PROMPT, text);
                    setAnalysis(JSON.parse(res.replace(/```json|```/g, "").trim()));
                } catch (e) { setError('Lỗi: ' + e.message); }
                setAnalyzing(false);
            };

            const generateID = () => {
                const d = new Date();
                const mmdd = `${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
                const rand = Math.random().toString(36).substring(2,6).toUpperCase();
                return `ACS-${mmdd}-${rand}`;
            };

            const handleFormat = async () => {
                setFormatting(true); setCards([]); setError('');
                try {
                    let text = tab === 'raw' ? rawInput : `ĐỀ: ${guided.hook}\nTHỰC: ${guided.context}\nLUẬN: ${guided.argument}\nKẾT: ${guided.conclusion}`;
                    if (analysis) text = `(Yêu cầu tách thành ${analysis.so_the_du_kien} thẻ)\n\n${text}`;
                    
                    const res = await callAI(SYSTEM_PROMPT, text);
                    const parsed = JSON.parse(res.replace(/```json|```/g, "").trim());
                    setCards(parsed.map(c => ({ ...c, local_id: generateID() })));
                } catch (e) { setError('Lỗi: ' + e.message); }
                setFormatting(false);
            };

            const copyAll = () => {
                const rows = cards.map(c => 
                    `${c.local_id}\t${c.ten_the}\t${c.cau_cot_loi}\t${c.noi_dung}\t${c.nguon}\t${c.chu_de}\tpending\t\t`
                ).join('\n');
                navigator.clipboard.writeText(rows);
                setCopied(true); setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="max-w-3xl mx-auto px-4 py-10 mobile-p">
                    {/* Header */}
                    <div className="mb-10 text-center">
                        <h1 className="font-serif text-3xl font-bold mb-2">ACS Writing Assistant v4.1</h1>
                        <p className="text-gray-500 text-sm italic">"Đánh thức những ham muốn đã luôn ở đó."</p>
                    </div>

                    {/* Key Config */}
                    <div className="paper p-4 mb-6 flex items-center gap-3">
                        <span className="text-xs font-bold text-gray-400 uppercase">OpenAI Key</span>
                        <input type="password" value={apiKey} onChange={(e)=>saveKey(e.target.value)} 
                               className="flex-1 text-sm bg-transparent border-none focus:ring-0" placeholder="sk-..." />
                    </div>

                    {/* Tabs */}
                    <div className="flex gap-6 mb-6 px-2 border-b border-gray-200">
                        <button onClick={()=>setTab('raw')} className={`pb-2 text-sm ${tab==='raw'?'tab-active':'text-gray-400'}`}>Dán ghi chú thô</button>
                        <button onClick={()=>setTab('guided')} className={`pb-2 text-sm ${tab==='guided'?'tab-active':'text-gray-400'}`}>Viết hướng dẫn (Đề-Thực-Luận-Kết)</button>
                    </div>

                    {/* Input Area */}
                    <div className="paper p-6 mb-6">
                        {tab === 'raw' ? (
                            <textarea value={rawInput} onChange={(e)=>setRawInput(e.target.value)}
                                      className="w-full h-48 input-classic p-4 text-sm leading-relaxed" 
                                      placeholder="Paste ghi chú thô, quan sát hoặc ý tưởng tại đây..." />
                        ) : (
                            <div className="space-y-4">
                                <div>
                                    <label className="text-[11px] font-bold text-gray-400 uppercase">ĐỀ (Hook)</label>
                                    <p className="text-[10px] italic text-gray-500 mb-1">Mở đầu bằng nghịch lý, câu hỏi gây tò mò. Vd: Tại sao càng làm nhiều càng ít tiền?</p>
                                    <textarea value={guided.hook} onChange={(e)=>setGuided({...guided, hook:e.target.value})} className="w-full h-16 input-classic p-3 text-sm" />
                                </div>
                                <div>
                                    <label className="text-[11px] font-bold text-gray-400 uppercase">THỰC (Context)</label>
                                    <p className="text-[10px] italic text-gray-500 mb-1">Bối cảnh cụ thể. Phải có nhân vật, địa điểm cụ thể.</p>
                                    <textarea value={guided.context} onChange={(e)=>setGuided({...guided, context:e.target.value})} className="w-full h-16 input-classic p-3 text-sm" />
                                </div>
                                <div>
                                    <label className="text-[11px] font-bold text-gray-400 uppercase">LUẬN (Argument)</label>
                                    <p className="text-[10px] italic text-gray-500 mb-1">Tại sao nó lại như vậy? Giải quyết băn khoăn của người đọc.</p>
                                    <textarea value={guided.argument} onChange={(e)=>setGuided({...guided, argument:e.target.value})} className="w-full h-16 input-classic p-3 text-sm" />
                                </div>
                                <div>
                                    <label className="text-[11px] font-bold text-gray-400 uppercase">KẾT (Conclusion)</label>
                                    <p className="text-[10px] italic text-gray-500 mb-1">Đúc rút đứng được một mình (Core Lesson).</p>
                                    <textarea value={guided.conclusion} onChange={(e)=>setGuided({...guided, conclusion:e.target.value})} className="w-full h-16 input-classic p-3 text-sm" />
                                </div>
                            </div>
                        )}

                        <div className="mt-6 flex gap-3">
                            <button onClick={handleAnalyze} disabled={analyzing || formatting} className="flex-1 py-3 text-sm border border-gray-300 rounded-md font-semibold hover:bg-gray-50 transition">
                                {analyzing ? '⏳ Phân tích...' : '🔍 Chẩn báo (Analyze)'}
                            </button>
                            <button onClick={handleFormat} disabled={formatting || analyzing || !apiKey} className="flex-[2] py-3 text-sm btn-primary rounded-md font-semibold shadow-md">
                                {formatting ? '⏳ Đang đúc kết...' : '✨ Sắc nét hóa (Format)'}
                            </button>
                        </div>
                        {error && <p className="mt-3 text-xs text-red-500 bg-red-50 p-2 rounded">{error}</p>}
                    </div>

                    {/* Analysis Section */}
                    {analysis && (
                        <div className="paper p-6 mb-6 bg-blue-50/50 border-blue-100 animate-in slide-in-from-top">
                            <h3 className="text-xs font-bold text-blue-600 uppercase mb-3 flex items-center justify-between">
                                Chẩn báo tri thức
                                <span className={`px-2 py-0.5 rounded text-[10px] ${analysis.chat_luong==='TỐT'?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}`}>{analysis.chat_luong}</span>
                            </h3>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="text-xs">
                                    <p className="text-gray-400 mb-1">Dự kiến tách</p>
                                    <p className="font-bold text-gray-700">{analysis.so_the_du_kien} thẻ Atomic</p>
                                </div>
                                <div className="text-xs">
                                    <p className="text-gray-400 mb-1">Nhận thức khán giả</p>
                                    <p className="font-bold text-gray-700">{analysis.bac_nhan_thuc}</p>
                                </div>
                            </div>
                            <ul className="mt-4 space-y-1.5 border-t border-blue-100 pt-3">
                                {analysis.goi_y.map((g,i) => <li key={i} className="text-[11px] text-gray-600 flex gap-2"><span>→</span> {g}</li>)}
                            </ul>
                        </div>
                    )}

                    {/* Output Section */}
                    {cards.length > 0 && (
                        <div className="space-y-8">
                            <div className="flex items-center justify-between px-2">
                                <h2 className="font-serif text-xl font-bold">Thẻ Tri Thức Đã Đúc Kết</h2>
                                <button onClick={copyAll} className="text-xs font-bold px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition">
                                    {copied ? '✅ ĐÃ COPY CHO GSHEET' : '📋 COPY TẤT CẢ (9 CỘT)'}
                                </button>
                            </div>

                            {cards.map((c, i) => (
                                <div key={i} className="paper p-8 relative">
                                    <div className="flex items-center justify-between mb-6">
                                        <div className="flex gap-2">
                                            <span className="text-[10px] font-bold text-gray-400 bg-gray-100 px-2 py-0.5 rounded">{c.local_id}</span>
                                            <span className="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded uppercase">{c.nguon}</span>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Atomic Score</div>
                                            <div className={`text-sm font-bold ${c.atomic_score > 8 ? 'text-green-600' : 'text-amber-600'}`}>{c.atomic_score}/10</div>
                                        </div>
                                    </div>

                                    <h3 className="font-serif text-2xl font-bold mb-4 leading-tight text-gray-800">{c.ten_the}</h3>
                                    
                                    <div className="bg-gray-50 border-l-4 border-gray-300 p-4 mb-6 italic text-gray-600 text-sm">
                                        "{c.cau_cot_loi}"
                                    </div>

                                    <div className="text-gray-700 text-[15px] leading-[1.8] whitespace-pre-wrap font-light mb-6">
                                        {c.noi_dung}
                                    </div>

                                    <div className="pt-4 border-t border-gray-100 flex justify-between items-center text-[10px] text-gray-400">
                                        <span>Pillar: {c.chu_de}</span>
                                        <span>Đánh giá: {c.ly_do_score}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    <footer className="mt-20 py-8 border-t border-gray-200 text-center text-[10px] text-gray-400 uppercase tracking-[0.2em]">
                        © 2026 Atomic Content System // {USER_NAME}
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
